version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tooth-truth-db
    environment:
      POSTGRES_DB: tooth_truth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: tooth-truth-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/tooth_truth_db?schema=public
      JWT_SECRET: your-jwt-secret-key-here-change-in-production
      JWT_REFRESH_SECRET: your-refresh-secret-key-here-change-in-production
      JWT_ACCESS_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      PORT: 3001
      NODE_ENV: development
      FRONTEND_URL: http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npx prisma migrate dev --name init && npx prisma db seed && npm run start:dev"

  frontend:
    build: ./frontend
    container_name: tooth-truth-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  postgres_data:
